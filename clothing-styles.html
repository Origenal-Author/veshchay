  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #06060f;
    color: #E0E8F0;
    font-family: 'JetBrains Mono', Courier, monospace;
    min-height: 100vh;
    padding: 30px 20px;
    background-image:
      linear-gradient(rgba(0,255,240,0.03) 1px,transparent 1px),
      linear-gradient(90deg,rgba(0,255,240,0.03) 1px,transparent 1px);
    background-size: 40px 40px;
  }

  .subtitle { text-align: center; color: #506080; letter-spacing: 3px; font-size: 11px; margin-bottom: 36px; }

  .collection-title {
    color: #00FFF0; letter-spacing: 6px; font-size: 16px;
    margin: 36px auto 6px; text-align: center; max-width: 1100px;
    text-shadow: 0 0 12px rgba(0,255,240,0.5);
  }
  .collection-desc {
    color: #8892B0; letter-spacing: 2px; font-size: 10px;
    margin-bottom: 18px; text-align: center;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 14px;
    max-width: 1100px; margin: 0 auto 20px;
  }
  .card {
    background: rgba(13,13,26,0.7);
    border: 1px solid rgba(0,255,240,0.15);
    border-radius: 10px;
    padding: 14px 10px;
    text-align: center;
  }
  .canvas-wrap {
    width: 144px; height: 144px;
    margin: 0 auto 8px;
    display: flex; align-items: center; justify-content: center;
    border: 1px dashed rgba(255,255,255,0.06);
    border-radius: 6px;
  }
  canvas, svg {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  .name { color: #00FFF0; font-size: 11px; letter-spacing: 1.5px; margin-bottom: 4px; font-weight: bold; }
  .descr { color: #8892B0; font-size: 9px; line-height: 1.3; margin-top: 4px; }
  .style-tag {
    display: inline-block;
    font-size: 8px; padding: 2px 6px;
    border: 1px solid; border-radius: 3px;
    letter-spacing: 1px;
  }
  hr.divider {
    max-width: 1100px;
    margin: 50px auto 0;
    border: none;
    border-top: 1px solid rgba(255,255,255,0.08);
  }

  #error { color:#FF006E; padding:20px; max-width:800px; margin:0 auto; white-space:pre-wrap; font-size:12px; }

// ─── RENDER ──────────────────────────────────────────────────────────
function drawPixel(canvas, item, size) {
  const N = size || 16;
  const SIZE = 144;
  canvas.width = SIZE;
  canvas.height = SIZE;
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  const cell = SIZE / N;
  for (let y = 0; y < N; y++) {
    const row = item.pixels[y] || '';
    for (let x = 0; x < N; x++) {
      const ch = row[x];
      if (!ch || ch === '.' || !item.palette[ch]) continue;
      ctx.fillStyle = item.palette[ch];
      ctx.fillRect(Math.floor(x * cell), Math.floor(y * cell), Math.ceil(cell), Math.ceil(cell));
    }
  }
}

const root = document.getElementById('root');

function renderCollection(col) {
  const title = document.createElement('div');
  title.className = 'collection-title';
  title.textContent = col.title;
  root.appendChild(title);

  const desc = document.createElement('div');
  desc.className = 'collection-desc';
  desc.textContent = col.desc;
  root.appendChild(desc);

  const grid = document.createElement('div');
  grid.className = 'grid';
  root.appendChild(grid);

  col.items.forEach(item => {
    const card = document.createElement('div');
    card.className = 'card';

    const wrap = document.createElement('div');
    wrap.className = 'canvas-wrap';
    card.appendChild(wrap);

    if (col.render === 'pixel') {
      const canvas = document.createElement('canvas');
      wrap.appendChild(canvas);
      drawPixel(canvas, item, col.size);
    } else if (col.render === 'vector') {
      wrap.innerHTML = item.svg;
    } else if (col.render === 'ascii') {
      const span = document.createElement('div');
      span.style.fontSize = '52px';
      span.style.color = item.color;
      span.style.textShadow = '0 0 12px ' + item.color;
      span.style.fontFamily = 'JetBrains Mono, monospace';
      span.style.letterSpacing = '4px';
      span.textContent = item.text;
      if (item.sub === 'glitch') {
        span.style.animation = 'glitch 0.6s steps(3) infinite';
      }
      wrap.appendChild(span);
    }

    const name = document.createElement('div');
    name.className = 'name';
    name.textContent = item.name;
    card.appendChild(name);

    const d = document.createElement('div');
    d.className = 'descr';
    d.textContent = item.desc;
    card.appendChild(d);

    grid.appendChild(card);
  });

  const hr = document.createElement('hr');
  hr.className = 'divider';
  root.appendChild(hr);
}

[COLLECTION_A, COLLECTION_B, COLLECTION_C, COLLECTION_D, COLLECTION_E, COLLECTION_F].forEach(renderCollection);

} catch(err) {
  document.getElementById('error').textContent = 'ОШИБКА: ' + (err && err.message ? err.message : err) + '\n\n' + (err && err.stack ? err.stack : '');
